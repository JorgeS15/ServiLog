services:
  maquina-tracker:
    build: .
    # ou usa a imagem pré-construída:
    # image: ghcr.io/teu-user/maquina-tracker:latest
    container_name: maquina-tracker
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/tracker.db
      - PORT=3000
    # Expõe só localmente — o Caddy faz o reverse proxy
    expose:
      - "3000"
    # Para acesso directo sem Caddy (opcional, remove se usares Caddy):
    # ports:
    #   - "3000:3000"
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
